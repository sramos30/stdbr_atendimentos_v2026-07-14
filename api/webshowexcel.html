        function onChangeForm1(evt) {
            let fldName = evt.target.name.toUpperCase();
            let fldValue = evt.target.value;
            let className = evt.target.className.toUpperCase();

            writeToConsole(`fldName:${fldName}, fldValue:${fldValue}, className:${className}`);

            switch( fldName ) {
                case "ID": {
                    objAtendimento.atdId = fldValue;
                    break;
                }
                case "DCPFILETODELETE": {
                    if ( className == "CBDCPFILES" ){
                        let cbDcpFiles = document.querySelectorAll(".cbDcpFiles");

                        objAtendimento.dcpFileToDelete = [];

                        cbDcpFiles.forEach(i => {
                            if (i.checked) {
                                objAtendimento.dcpFileToDelete.push(i.id);
                            }
                        });
                    }
                    break;
                }
            }
        }

        function writeToConsole(text = "") {

        async function sendJson( json ) {
            let id = (json && json.atdId)?json.atdId:"New";
            let action = (id=="New")?"POST":"PUT";

            let headers = new Headers();
            //let formData = new FormData();

            headers.append('Accept', 'application/json');
            headers.append("Content-type", "application/json");

            //formData.append("json", JSON.stringify(json) );

            return await fetch(`/atendimentos/api/planos.php`, {
                headers: headers,
                mode: 'cors', // no-cors, *cors, same-origin
                body: JSON.stringify(json),
                method: action, // *GET, POST, PUT, DELETE, etc.
                cache: 'no-cache', // *default, no-cache, reload, force-cache, only-if-cached
                credentials: 'same-origin', // include, *same-origin, omit
                redirect: 'follow', // manual, *follow, error
                referrerPolicy: 'no-referrer', // no-referrer, *no-referrer-when-downgrade, origin, origin-when-cross-origin, same-origin, strict-origin, strict-origin-when-cross-origin, unsafe-url
            })
            .then(response => {
                return response.json();
            })
            .then( json => {
                return json;       
            })
            .catch(err => {
                let error = `catch: fetch: ${JSON.stringify(err)}`;
                writeToConsole(error);
            })
        }
